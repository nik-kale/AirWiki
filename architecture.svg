<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" role="img" aria-labelledby="title desc">
  <title id="title">AirWiki architecture</title>
  <desc id="desc">A three-layer architecture diagram showing immutable raw sources, an LLM maintainer using an AirWiki skill, and an Airtable wiki with eight linked tables and four operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#14242b"/>
      <stop offset="1" stop-color="#18202f"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6f73"/>
      <stop offset="1" stop-color="#3f8f7f"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8d6a2e"/>
      <stop offset="1" stop-color="#bf8b3b"/>
    </linearGradient>
    <linearGradient id="wikiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36598c"/>
      <stop offset="1" stop-color="#6a5b9a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L16,9 L2,16 Z" fill="#dce6ea"/>
    </marker>
    <style>
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f5f7f8; letter-spacing: 0; }
      .muted { fill: #b8c6cc; }
      .small { font-size: 30px; }
      .body { font-size: 38px; }
      .h2 { font-size: 52px; font-weight: 750; }
      .h1 { font-size: 104px; font-weight: 800; }
      .chipText { font-size: 34px; font-weight: 720; }
      .tiny { font-size: 26px; }
      .stroke { stroke: rgba(255,255,255,0.18); stroke-width: 2; }
    </style>
  </defs>

  <rect width="2400" height="1500" rx="0" fill="url(#bg)"/>
  <g opacity="0.32">
    <path d="M-80 290 C250 150 510 540 870 340 C1210 150 1460 230 1720 390 C1960 535 2190 450 2480 280" fill="none" stroke="#63c7b2" stroke-width="3"/>
    <path d="M-60 1190 C280 990 565 1290 900 1100 C1240 905 1505 1010 1760 1150 C2020 1290 2220 1130 2460 980" fill="none" stroke="#d8a24a" stroke-width="3"/>
  </g>

  <text x="120" y="150" class="label h1">AirWiki</text>
  <text x="124" y="215" class="label body muted">LLM Wiki pattern on Airtable + MCP</text>
  <text x="120" y="281" class="label small muted">A cloud-native, linked-record substrate for persistent agent-maintained knowledge.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="360" width="560" height="330" rx="28" fill="rgba(255,255,255,0.06)" class="stroke"/>
    <rect x="140" y="400" width="106" height="106" rx="24" fill="url(#sourceGrad)"/>
    <text x="270" y="454" class="label h2">Raw Sources</text>
    <text x="270" y="506" class="label small muted">immutable ground truth</text>
    <text x="150" y="575" class="label body">Articles, papers, PDFs</text>
    <text x="150" y="625" class="label body">podcasts, screenshots</text>
    <text x="150" y="675" class="label body">web pages, transcripts</text>

    <rect x="920" y="360" width="560" height="330" rx="28" fill="rgba(255,255,255,0.06)" class="stroke"/>
    <rect x="950" y="400" width="106" height="106" rx="24" fill="url(#agentGrad)"/>
    <text x="1080" y="454" class="label h2">LLM Maintainer</text>
    <text x="1080" y="506" class="label small muted">agent + AirWiki skill</text>
    <text x="960" y="575" class="label body">Reads sources</text>
    <text x="960" y="625" class="label body">Discusses takeaways</text>
    <text x="960" y="675" class="label body">Writes cited updates</text>

    <rect x="1730" y="360" width="560" height="330" rx="28" fill="rgba(255,255,255,0.06)" class="stroke"/>
    <rect x="1760" y="400" width="106" height="106" rx="24" fill="url(#wikiGrad)"/>
    <text x="1890" y="454" class="label h2">Airtable Wiki</text>
    <text x="1890" y="506" class="label small muted">structured linked records</text>
    <text x="1770" y="575" class="label body">Cloud, mobile, shareable</text>
    <text x="1770" y="625" class="label body">Linked-record relationships</text>
    <text x="1770" y="675" class="label body">Queryable by MCP agents</text>
  </g>

  <path d="M690 525 L895 525" stroke="#dce6ea" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1500 525 L1705 525" stroke="#dce6ea" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="724" y="490" class="label tiny muted">compile</text>
  <text x="1540" y="490" class="label tiny muted">writeback</text>

  <g filter="url(#shadow)">
    <rect x="110" y="820" width="1400" height="465" rx="28" fill="rgba(255,255,255,0.07)" class="stroke"/>
    <text x="150" y="895" class="label h2">Eight-table wiki schema</text>
    <text x="152" y="945" class="label small muted">Every source becomes structured memory, not just another bookmark.</text>

    <g>
      <rect x="150" y="1000" width="290" height="92" rx="18" fill="#244f55" class="stroke"/>
      <text x="185" y="1058" class="label chipText">Sources</text>
      <rect x="470" y="1000" width="290" height="92" rx="18" fill="#334d74" class="stroke"/>
      <text x="505" y="1058" class="label chipText">Articles</text>
      <rect x="790" y="1000" width="290" height="92" rx="18" fill="#4a486f" class="stroke"/>
      <text x="825" y="1058" class="label chipText">Notes</text>
      <rect x="1110" y="1000" width="290" height="92" rx="18" fill="#5b4c36" class="stroke"/>
      <text x="1145" y="1058" class="label chipText">Entities</text>

      <rect x="150" y="1125" width="290" height="92" rx="18" fill="#5a3f53" class="stroke"/>
      <text x="185" y="1183" class="label chipText">Concepts</text>
      <rect x="470" y="1125" width="290" height="92" rx="18" fill="#2f5d4b" class="stroke"/>
      <text x="505" y="1183" class="label chipText">Syntheses</text>
      <rect x="790" y="1125" width="290" height="92" rx="18" fill="#6d6338" class="stroke"/>
      <text x="825" y="1183" class="label chipText">Topics</text>
      <rect x="1110" y="1125" width="290" height="92" rx="18" fill="#584268" class="stroke"/>
      <text x="1145" y="1183" class="label chipText">Activity Log</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1580" y="820" width="710" height="465" rx="28" fill="rgba(255,255,255,0.07)" class="stroke"/>
    <text x="1620" y="895" class="label h2">Four operations</text>
    <text x="1622" y="945" class="label small muted">The daily verbs that make the wiki compound.</text>

    <rect x="1620" y="1000" width="300" height="86" rx="18" fill="#2f6f73"/>
    <text x="1655" y="1055" class="label chipText">Ingest</text>
    <rect x="1950" y="1000" width="300" height="86" rx="18" fill="#36598c"/>
    <text x="1985" y="1055" class="label chipText">Query</text>
    <rect x="1620" y="1118" width="300" height="86" rx="18" fill="#8d6a2e"/>
    <text x="1655" y="1173" class="label chipText">Synthesize</text>
    <rect x="1950" y="1118" width="300" height="86" rx="18" fill="#6a5b9a"/>
    <text x="1985" y="1173" class="label chipText">Lint</text>
  </g>

</svg>
